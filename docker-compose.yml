services:
  bot_app:
    restart: unless-stopped # 2. 设置重启策略
    mem_limit: 1g # 1. 设置内存硬限制为 1GB (您可以根据VPS配置调整)
    env_file:
      - .env
    environment:
      - RUNNING_IN_DOCKER=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3-embedding:0.6b}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-qwen3.5:0.8b}
      - VECTOR_MODE=${VECTOR_MODE:-local}

    # --- 部署方式二选一 ---
    # 方式一 (推荐): 从本地源代码构建
    # 优点: 使用最新代码、方便调试
    # build:
    #   context: .
    #   dockerfile: .devcontainer/Dockerfile

    # 方式二: 直接使用 Docker Hub 上的公共镜像
    # 优点: 快速、简单、无需本地构建。使用此方式时，请注释掉上面的 'build' 部分，并取消下方 'image' 行的注释。
    image: echoni0n/braingirl:latest

    container_name: Odysseia_Guidance
    volumes:
      - .:/app
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    # --- DEV请 取消 注释下面的command:sleep命令并且 注释 掉command: python ---
    #command: sleep infinity
    command: python3 -u -m src.main
    networks:
      - bot_network
    depends_on:
      db:
        condition: service_healthy
      # ollama 只在本地向量模式下需要
      # 如果 VECTOR_MODE=none 或 VECTOR_MODE=api，可以手动注释掉 ollama 依赖
      ollama:
        condition: service_started
        required: false

  blackjack_web:
    # build:
    #   context: .
    #   dockerfile: .devcontainer/Dockerfile
    image: echoni0n/braingirl:latest
    container_name: blackjack_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUNNING_IN_DOCKER=true
    #端口不再暴露到主机，通过 Caddy 代理
    # ports:
    #   - "${BLACKJACK_PORT:-8000}:8000"
    expose:
      - "8000"
    volumes:
      - .:/app
      - ./data:/app/data
    networks:
      - bot_network
    command: uvicorn src.chat.features.games.blackjack-web.app:app --host 0.0.0.0 --port 8000
    depends_on:
      - db

  # Caddy 反向代理 - 提供 HTTPS
  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80" # HTTP (用于证书验证)
      - "443:443" # HTTPS
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # 证书数据持久化
    networks:
      - bot_network
    depends_on:
      - blackjack_web

  #  config_web:
  #    build:
  #      context: .
  #      dockerfile: .devcontainer/Dockerfile
  #    container_name: config_web
  #    restart: unless-stopped
  #    env_file:
  #      - .env
  #    ports:
  #      - "${CONFIG_WEB_PORT:-8080}:80"
  #    networks:
  #      - bot_network
  #    volumes:
  #      - .:/app
  #      - /var/run/docker.sock:/var/run/docker.sock
  #    # --- DEV请 取失 注释下面的command: sleep命令并且 注释 掉command: gunicorn ---
  #    #command: sleep infinity
  #    command: gunicorn --chdir ./web --worker-class eventlet -w 1 --bind 0.0.0.0:80 "web-main:web_app"
  #    depends_on:
  #      - db

  db:
    # 使用官方打包好的 ParadeDB 镜像，它基于 PG16
    image: paradedb/paradedb:latest-pg16
    container_name: odysseia_pg_db # 保持与项目其余部分一致的命名
    restart: unless-stopped # 保持与项目其余部分一致的重启策略
    environment:
      # 沿用 .env 文件中的变量，更加灵活和安全
      POSTGRES_DB: ${POSTGRES_DB:-odysseia_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    #    ports:
    #      # 沿用变量端口映射，方便在不同环境中部署
    #      - "${DB_PORT:-5432}:5432"
    volumes:
      # 数据持久化到本地 ./pgdata 目录，并使用 PG16 的标准数据路径
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-odysseia_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    # Ollama 官方镜像，用于本地运行 embedding 模型
    # 注意：使用 expose 而非 ports，只在 Docker 内部网络可访问，不暴露到公网
    # 仅在 VECTOR_MODE=local 时需要启动此服务
    # 使用 --profile ollama 来启动此服务
    image: ollama/ollama:latest
    container_name: odysseia_ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - bot_network
    # 启动后自动拉取配置的 embedding 模型
    # 模型名称通过环境变量 OLLAMA_MODEL 配置，默认为 qwen3-embedding:0.6b
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5 &&
        echo '正在拉取 ${OLLAMA_MODEL:-qwen3-embedding:0.6b} 模型...' &&
        ollama pull ${OLLAMA_MODEL:-qwen3-embedding:0.6b} &&
        echo '模型拉取完成，Ollama 服务已就绪' &&
        tail -f /dev/null
      "
    profiles:
      - ollama

networks:
  bot_network:
    driver: bridge

volumes:
  caddy_data:
